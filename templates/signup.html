{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="signup-login">
        <div class="signup-box">
            <form method="post">
                {% csrf_token %}
                <h1>SignUp</h1>
                <div class="field">
                    <input type="text" required class="inp" placeholder="Username" name="username">
                </div>
                <div class="field">
                    <input type="email" required class="inp" placeholder="Email" name="email">
                </div>
                <div class="field">
                    <input type="password" required class="inp" placeholder="Password" name="password">
                </div>
                <div class="field">
                    <input type="submit" class="submit-button" value="signup">
                </div>
            </form>
            <div class="field">
                <b>Already Have Account ?</b>
                <br>
                <a href="/login">Login Here</a>
            </div>
        </div>
    </div>
</body>
</html>
